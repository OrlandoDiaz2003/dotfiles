set -g prefix C-x
unbind C-b
bind-key -T root C-x send-prefix

set -g mode-keys emacs
set -g status-keys emacs

set-option -a terminal-features 'xterm-256color:RGB'

set-option -sg escape-time 10
set-option -g focus-events on

set -g mouse on

set -g base-index 1
set -g pane-base-index 1

set-option -g status-position top 
set-option -g status-justify centre
set -g status-style "bg=default,fg=#e0def4"

set -g pane-border-lines simple
set -g pane-border-indicators arrows
set -g pane-border-style "fg=#6e6a86"          # Muted
set -g pane-active-border-style "fg=#31748f"   # Pine

set -g window-status-style "fg=#6e6a86,bg=default"
set -g window-status-format " #I:#W "

set -g window-status-current-style "fg=#ebbcba,bg=default,bold"
set -g window-status-current-format " #[fg=#ebbcba,bold]#I:#W#[default] "

set -g status-right "#[fg=#c4a7e7]%H:%M"

bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

bind-key -r i run-shell "tmux neww nani"
bind-key -r f run-shell "tmux neww tmux-sessionizer"

bind-key -T copy-mode-emacs C-@ send -X begin-selection
bind-key -T copy-mode-emacs M-w send -X copy-pipe-and-cancel "xclip -selection clipboard -i"
bind-key -T copy-mode-emacs C-w send -X copy-selection-and-cancel

bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9
