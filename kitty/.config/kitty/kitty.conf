cursor_shape block

font_family      family='Hack'
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 18

background_opacity 0.8

repaint_delay 8
input_delay 3
sync_to_monitor yes

touch_scroll_multiplier 2.0
wheel_scroll_multiplier 5.0

cursor_trail 3
cursor_trail_decay 0.1 0.4
cursor_trail_start_treshold 2
